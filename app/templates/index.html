<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo webapp from Engr Sampson</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 0 16px; }
    input[type="text"] { width: 75%; padding: 8px; font-size: 16px; }
    button { padding: 8px 16px; font-size: 16px; cursor: pointer; }
    ul { list-style: none; padding: 0; margin-top: 24px; }
    li { display: flex; justify-content: space-between; padding: 10px 0;
         border-bottom: 1px solid #eee; font-size: 16px; }
    a { color: red; text-decoration: none; font-size: 13px; }
  </style>
</head>
<body>
  <h1>My Todo List</h1>

  <!--
    The form POSTs to "/" — matching the route in app.py.
    The input name="todo" matches request.form["todo"] in the Python code.
  -->
  <form method="POST" action="/">
    <input type="text" name="todo" placeholder="Add a new task..." required />
    <button type="submit">Add</button>
  </form>

  <ul>
    <!--
      Jinja2 templating syntax (Flask's built-in template engine).
      'todos' is the list passed from app.py via render_template().
      'loop.index0' gives the zero-based position — used to build the delete URL.
    -->
    {% for task in todos %}
    <li>
      {{ task }}
      <a href="/delete/{{ loop.index0 }}">delete</a>
    </li>
    {% endfor %}

    {% if not todos %}
    <li style="color: #999;">No tasks yet. Add one above.</li>
    {% endif %}
  </ul>
</body>
</html>
